name: Daily P0 Monitor

on:
  schedule:
    - cron: '0 0 * * *'  # 09:00 KST (UTC+9 = UTC+0 00:00)
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run P0 critical tests
        id: test
        run: npm run test:critical
        continue-on-error: true
        env:
          ANCHOR_BASE_URL: ${{ secrets.ANCHOR_BASE_URL }}
          ANCHOR_PASSWORD: ${{ secrets.ANCHOR_TEST_PASSWORD }}
          ANCHOR_EMAIL_TAX_OFFICIAL: ${{ secrets.ANCHOR_TAX_OFFICER_EMAIL }}
          ANCHOR_EMAIL_TAX_GENERAL: ${{ secrets.ANCHOR_NON_OFFICER_EMAIL }}
          ANCHOR_EMAIL_FIRM_OWNER: ${{ secrets.ANCHOR_FIRM_OWNER_EMAIL }}
          ANCHOR_EMAIL_TAXPAYER_PAID: ${{ secrets.ANCHOR_PAID_USER_EMAIL }}
          ANCHOR_EMAIL_TAXPAYER_FREE: ${{ secrets.ANCHOR_FREE_USER_EMAIL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify Telegram on failure
        if: steps.test.outcome == 'failure'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="🚨 *Anchor E2E P0 실패* $(date +%Y-%m-%d)%0A%0A▶ 워크플로우: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"

      - name: Fail build on test failure
        if: steps.test.outcome == 'failure'
        run: exit 1
